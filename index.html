<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover для полного покрытия экрана -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mini App CRM</title>
  
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Стили -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Ваш контент -->
    <header class="header">
      <h1>CRM Система</h1>
      <p class="subtitle">Управление данными</p>
    </header>

    <div class="user-card">
      <h2 id="userName">Загрузка...</h2>
      <p>ID: <span id="userId">—</span></p>
    </div>

    <div class="info-section">
      <div class="info-card">
        <span class="info-label">Username</span>
        <span class="info-value" id="username">@—</span>
      </div>
      <div class="info-card">
        <span class="info-label">Статус</span>
        <span class="info-value" id="connectionStatus">Готово</span>
      </div>
    </div>

    <div class="action-section">
      <!-- Кнопка фуллскрина (опционально) -->
      <button id="fullscreenBtn" class="btn-secondary" style="display:none;">
        <span id="fullscreenText">На весь экран</span>
      </button>
      
      <!-- Основная кнопка действия -->
      <button id="saveBtn" class="btn-primary">
        Сохранить данные
      </button>
    </div>

    <footer class="footer">
      <p>© 2026 CRM System</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
